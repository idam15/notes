<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Catatan Keuangan</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #333;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

.total-box {
  text-align: center;
}

.total {
  font-size: 28px;
  font-weight: bold;
  color: #e74c3c;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #4CAF50;
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
}

/* Zebra effect */
tbody tr:nth-child(even) {
  background: #f9f9f9;
}

/* Hover effect */
tbody tr:hover {
  background: #e3f2fd;
  transition: 0.2s;
}

/* Responsive */
@media (max-width: 600px) {
  table {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<h1>💰 Catatan Keuangan</h1>

<div class="container">

  <div class="card total-box">
    <h3>Total Pengeluaran</h3>
    <div class="total" id="total">Rp 0</div>
  </div>

  <div class="card">
    <h3>Riwayat Pengeluaran</h3>
    <table id="tabel">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Keterangan</th>
          <th>Jumlah</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>
const url = "LINK_KAMU";

fetch(url)
  .then(res => res.json())
  .then(data => {
    let total = 0;
    const tbody = document.querySelector("#tabel tbody");

    data.forEach(item => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${item.tanggal}</td>
        <td>${item.keterangan}</td>
        <td>Rp ${parseInt(item.jumlah).toLocaleString()}</td>
      `;

      total += parseInt(item.jumlah);
      tbody.appendChild(tr);
    });

    document.getElementById("total").innerText =
      "Rp " + total.toLocaleString();
  });
</script>

</body>
</html>
