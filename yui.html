<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Catatan Keuangan</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 20px;
}

/* LOGIN OVERLAY */
#login-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(238, 242, 247, 0.98);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.login-card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
  max-width: 350px;
  width: 90%;
}

.login-card input {
  width: 100%;
  padding: 12px;
  margin: 15px 0;
  border: 1px solid #ddd;
  border-radius: 8px;
  box-sizing: border-box;
}

.login-card button {
  width: 100%;
  padding: 12px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.login-card button:hover { background: #45a049; }

/* KONTEN UTAMA (Sembunyikan dulu) */
#main-content { display: none; }

h1 { text-align: center; color: #333; }
.container { max-width: 900px; margin: auto; }
.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

.total-box { text-align: center; }
.total { font-size: 28px; font-weight: bold; color: #e74c3c; }

table { width: 100%; border-collapse: collapse; }
th { background: #4CAF50; color: white; padding: 12px; }
td { padding: 10px; }
tbody tr:nth-child(even) { background: #f9f9f9; }
tbody tr:hover { background: #e3f2fd; transition: 0.2s; }

@media (max-width: 600px) { table { font-size: 12px; } }
</style>
</head>

<body>

<!-- Layar Login -->
<div id="login-overlay">
  <div class="login-card">
    <h2>🔒 Terkunci</h2>
    <p>Masukkan password untuk akses</p>
    <input type="password" id="pass-input" placeholder="Password...">
    <button onclick="cekPassword()">Masuk</button>
    <p id="pesan-error" style="color:red; display:none; font-size:14px; margin-top:10px;">Password salah!</p>
  </div>
</div>

<!-- Konten Utama -->
<div id="main-content">
  <h1>💰 Catatan Keuangan</h1>
  <div class="container">
    <div class="card total-box">
      <h3>Total Pengeluaran</h3>
      <div class="total" id="total">Rp 0</div>
    </div>
    <div class="card">
      <h3>Riwayat Pengeluaran</h3>
      <table id="tabel">
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>Keterangan</th>
            <th>Jumlah</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const passwordBenar = "idamganteng785"; // <--- GANTI PASSWORD DI SINI
const url = "LINK_KAMU";      // <--- GANTI LINK DATA DI SINI

function cekPassword() {
  const input = document.getElementById("pass-input").value;
  if (input === passwordBenar) {
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("main-content").style.display = "block";
    muatData();
  } else {
    document.getElementById("pesan-error").style.display = "block";
  }
}

// Tambahkan fungsi untuk tekan "Enter" saat mengetik password
document.getElementById("pass-input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") cekPassword();
});

function muatData() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      let total = 0;
      const tbody = document.querySelector("#tabel tbody");
      tbody.innerHTML = ""; // Bersihkan tabel

      data.forEach(item => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.tanggal}</td>
          <td>${item.keterangan}</td>
          <td>Rp ${parseInt(item.jumlah).toLocaleString()}</td>
        `;
        total += parseInt(item.jumlah);
        tbody.appendChild(tr);
      });

      document.getElementById("total").innerText = "Rp " + total.toLocaleString();
    });
}
</script>

</body>
</html>
